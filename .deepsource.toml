version = 1

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]
  environment = ["browser"]
  # Disable documentation coverage threshold — we don't write JSDoc for React components
  thresholds = { documentation_coverage = 0 }

[[transformers]]
name = "prettier"
enabled = true

[transformers.meta]
version = "2"

# ── Intentional / false positives ─────────────────────────────────────────────

[[issues]]
# Supabase PUBLISHABLE (anon) key in .env — intentionally public, exposed in compiled JS bundle.
# Row-Level Security protects data, not keeping this key secret.
issue_code = "SCT-1004"
file_patterns = [".env", ".env.*"]

[[issues]]
# "Syntax error" false positives in ESM config files — DeepSource doesn't understand ESM module format.
issue_code = "JS-0833"
file_patterns = ["postcss.config.js", "eslint.config.js", "*.config.*"]

[[issues]]
# Global scope false positive for module-level React components — standard React pattern.
# DeepSource flags top-level function components as "global scope" but they're ES module exports.
# This is a false positive for all ES module files — nothing here is actually global.
issue_code = "JS-0067"
file_patterns = ["src/**", "supabase/**"]

[[issues]]
# Cyclomatic complexity in React components — inherent to JSX rendering logic with conditionals.
issue_code = "JS-R1005"
file_patterns = ["src/components/**", "src/pages/**", "src/store/**", "supabase/functions/**"]

[[issues]]
# JSX nesting depth — inherent to complex UI layouts (kanban cards, modals, etc).
issue_code = "JS-0415"
file_patterns = ["src/components/**", "src/pages/**"]

[[issues]]
# Unescaped apostrophes/special chars in JSX text — cosmetic, React renders correctly.
issue_code = "JS-0454"

[[issues]]
# require() in tailwind.config.ts — CommonJS interop in config files is fine.
issue_code = "JS-0359"
file_patterns = ["tailwind.config.ts", "*.config.*"]

# ── shadcn/ui generated code — not ours to change ─────────────────────────────

[[issues]]
# Wildcard imports in shadcn/ui generated components.
issue_code = "JS-C1003"
file_patterns = ["src/components/ui/**", "src/hooks/use-toast.ts", "src/hooks/use-mobile.tsx"]

[[issues]]
# Empty interfaces in shadcn/ui components — intentional extension points.
issue_code = "JS-0322"
file_patterns = ["src/components/ui/**"]

[[issues]]
# dangerouslySetInnerHTML in shadcn chart component — generated code.
issue_code = "JS-0440"
file_patterns = ["src/components/ui/chart.tsx", "src/pages/SharedPageView.tsx", "src/hooks/useBlockEditor.ts"]

[[issues]]
# Wrong DOM property (cmdk generated component).
issue_code = "JS-0455"
file_patterns = ["src/components/ui/**"]

[[issues]]
# Shorthand coercions in shadcn/ui hooks — generated code.
issue_code = "JS-0066"
file_patterns = ["src/hooks/use-mobile.tsx", "src/components/ui/**"]

[[issues]]
# Shorthand property syntax — shadcn/ui generated hooks.
issue_code = "JS-0240"
file_patterns = ["src/hooks/use-toast.ts", "src/components/ui/**"]

[[issues]]
# Trailing undefined in use-mobile — shadcn generated hook.
issue_code = "JS-W1042"
file_patterns = ["src/hooks/use-mobile.tsx"]

# ── Standard React patterns ────────────────────────────────────────────────────

[[issues]]
# Variables-before-defined in React hooks — hoisting is intentional.
issue_code = "JS-0357"
file_patterns = ["src/**", "supabase/**"]

[[issues]]
# Unused variables — many are type-only imports or intentional destructuring.
issue_code = "JS-0356"
file_patterns = ["src/**", "supabase/**"]

[[issues]]
# any type — used in Deno edge functions and legacy migration code where types aren't available.
issue_code = "JS-0323"
file_patterns = ["supabase/functions/**", "src/components/MigrationModal.tsx", "src/pages/SharedPageView.tsx"]

[[issues]]
# Non-null assertions — used in Deno edge functions where env vars are guaranteed by deploy config.
issue_code = "JS-0339"
file_patterns = ["supabase/functions/**", "src/components/WhatsNewModal.tsx"]

[[issues]]
# Inconsistent returns in switch helpers — exhaustive type switches where all cases return.
issue_code = "JS-0045"
file_patterns = ["src/components/**", "src/hooks/**"]

[[issues]]
# Index as key prop — used in static lists that never reorder (changelog, settings lists).
issue_code = "JS-0437"
file_patterns = ["src/components/WhatsNewModal.tsx", "src/pages/Changelog.tsx"]

[[issues]]
# Class methods not using `this` — ErrorBoundary lifecycle method, required signature.
issue_code = "JS-0105"
file_patterns = ["src/components/RootErrorBoundary.tsx", "src/components/EditorErrorBoundary.tsx"]

[[issues]]
# Unused state in ErrorBoundary — standard getDerivedStateFromError pattern requires state shape.
issue_code = "JS-0458"
file_patterns = ["src/components/EditorErrorBoundary.tsx", "src/components/RootErrorBoundary.tsx"]

[[issues]]
# Short variable names (e.g. `c`, `p`) — idiomatic in filter/map callbacks.
issue_code = "JS-C1002"
file_patterns = ["src/**"]

[[issues]]
# alert/confirm/prompt — intentional debug utility in FloatingToolbar (dev only).
issue_code = "JS-0052"
file_patterns = ["src/components/FloatingToolbar.tsx"]

[[issues]]
# delete operator with computed key — intentional pattern for removing optional style keys.
issue_code = "JS-0320"
file_patterns = ["src/components/GroupBlock.tsx"]

[[issues]]
# Unnecessary fragment — may be needed for conditional rendering in wrapper components.
issue_code = "JS-0424"
file_patterns = ["src/components/ResizableSidebarWrapper.tsx"]

[[issues]]
# Empty functions in test setup files — intentional mocks.
issue_code = "JS-0321"
file_patterns = ["src/test/**"]
