# Parchment API
Programmatically manage your collections, pages, and blocks.

## Base URL
https://theparchment.app/functions/v1/api

## Authentication
All requests require header: x-api-key

curl -X POST https://theparchment.app/functions/v1/api \
  -H "Content-Type: application/json" \
  -H "x-api-key: pmt_your_key" \
  -d '{"action":"list_collections"}'

## Rate Limits
- 60 requests/minute per API key
- 1000 requests/day per API key
- 10KB max content per block
- Free plan accounts are limited to 5 collections — create_collection returns HTTP 402 when the limit is reached

## Actions
- list_collections
- create_collection
- delete_collection
- rename_collection
- list_pages
- create_page
- delete_page
- rename_page
- get_page
- append_blocks (adds blocks to END of page — does NOT replace existing)
- replace_blocks (deletes all existing blocks, writes new ones in array order — use for full rewrites)
- update_blocks (alias for append_blocks — kept for backwards compatibility)
- delete_block
- delete_group

## move_page
curl -X POST https://theparchment.app/functions/v1/api \
  -H "Content-Type: application/json" \
  -H "x-api-key: pmt_your_key" \
  -d '{"action":"move_page","page_id":"&lt;page_id&gt;","collection_id":"&lt;target_collection_id&gt;"}'

## move_collection
curl -X POST https://theparchment.app/functions/v1/api \
  -H "Content-Type: application/json" \
  -H "x-api-key: pmt_your_key" \
  -d '{"action":"move_collection","collection_id":"&lt;collection_id&gt;","workspace_id":"&lt;target_workspace_id&gt;"}'

## Block Types
- text
- heading1
- heading2
- heading3
- bullet_list
- numbered_list
- todo (checkbox)
- quote
- divider
- code
- group (container block — groups child blocks together; use group_id on child blocks to associate them)

## Nested Lists (indent_level)
bullet_list and numbered_list blocks support an indent_level field (integer, 0-4) for nested sub-lists.
- Level 0 (default): top-level — rendered as 1, 2, 3
- Level 1: sub-items — rendered as a, b, c
- Level 2+: deep sub-items — rendered as i, ii, iii (roman numerals)
Example: {"type":"numbered_list","content":"Sub-item","indent_level":1}

## Block Content Format
Block content is stored as HTML strings. Use standard HTML tags for formatting:
- Bold: &lt;b&gt;bold&lt;/b&gt; or &lt;strong&gt;bold&lt;/strong&gt;
- Italic: &lt;i&gt;italic&lt;/i&gt; or &lt;em&gt;italic&lt;/em&gt;
- Strikethrough: &lt;s&gt;strikethrough&lt;/s&gt; or &lt;del&gt;strikethrough&lt;/del&gt;
- Link: &lt;a href="url"&gt;link text&lt;/a&gt;
- Color: &lt;span style="color: red"&gt;colored text&lt;/span&gt;

## append_blocks example (adds to end of page)
curl -X POST https://theparchment.app/functions/v1/api \
  -H "Content-Type: application/json" \
  -H "x-api-key: pmt_your_key" \
  -d '{
    "action": "append_blocks",
    "page_id": "&lt;page_id&gt;",
    "blocks": [
      {
        "type": "heading1",
        "content": "&lt;span style=\"color: red\"&gt;My Red Heading&lt;/span&gt;"
      },
      {
        "type": "text",
        "content": "First item"
      }
    ]
  }'

## replace_blocks example (rewrites entire page — RECOMMENDED for full page writes)
curl -X POST https://theparchment.app/functions/v1/api \
  -H "Content-Type: application/json" \
  -H "x-api-key: pmt_your_key" \
  -d '{
    "action": "replace_blocks",
    "page_id": "&lt;page_id&gt;",
    "blocks": [
      { "type": "heading1", "content": "My Page Title" },
      { "type": "text", "content": "First paragraph." },
      { "type": "divider" },
      { "type": "text", "content": "Second paragraph." }
    ]
  }'
NOTE: update_blocks is kept as an alias for append_blocks for backwards compatibility.
NOTE: append_blocks returns the full blocks array in its response. replace_blocks returns only {success, mode, blocks_written} — use get_page after replace_blocks if you need block IDs.
NOTE: Every newly created page starts with an empty text block at position 0. replace_blocks removes it; append_blocks leaves it in place.

## rename_page
curl -X POST https://theparchment.app/functions/v1/api \
  -H "Content-Type: application/json" \
  -H "x-api-key: pmt_your_key" \
  -d '{"action":"rename_page","page_id":"&lt;page_id&gt;","title":"My New Title"}'

## rename_collection
curl -X POST https://theparchment.app/functions/v1/api \
  -H "Content-Type: application/json" \
  -H "x-api-key: pmt_your_key" \
  -d '{"action":"rename_collection","collection_id":"&lt;collection_id&gt;","name":"My Collection"}'

## delete_block
curl -X POST https://theparchment.app/functions/v1/api \
  -H "Content-Type: application/json" \
  -H "x-api-key: pmt_your_key" \
  -d '{"action":"delete_block","page_id":"&lt;page_id&gt;","block_id":"&lt;block_id&gt;"}'

## Group Blocks
A group block is a container (like a div) that holds child blocks together.
Create a group block first, then append child blocks with group_id set to the group's id.
Use delete_group to delete the group and all its children in one operation.

## delete_group
curl -X POST https://theparchment.app/functions/v1/api \
  -H "Content-Type: application/json" \
  -H "x-api-key: pmt_your_key" \
  -d '{"action":"delete_group","page_id":"&lt;page_id&gt;","group_block_id":"&lt;group_id&gt;"}'

## Data Export
Use list_collections to get all collections, list_pages for each collection,
and get_page for each page (which includes all blocks with id, type, content, position).
